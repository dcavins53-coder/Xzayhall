<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xzaviar Hall Journey</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="app.js" defer></script>
</head>
<body>

    <!-- Header Section -->
    <header>Xzaviar's Memory Lane</header>

    <!-- Main Content Area -->
    <main>
        
        <!-- System Stats Dashboard Panel -->
        <section class="dashboard-stats">
            <div class="dashboard-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <h2 class="dashboard-title">system_stats // class_of_2026</h2>
            </div>
            
            <div class="stats-container">
                <!-- Stat 1 -->
                <div class="stat-row">
                    <div class="stat-info">
                        <span class="stat-name"><i class="code-icon">&lt;/&gt;</i> Innovation & Tech</span>
                        <span class="stat-percentage">98%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 98%;"></div>
                    </div>
                </div>

                <!-- Stat 2 -->
                <div class="stat-row">
                    <div class="stat-info">
                        <span class="stat-name">🧠 Logic & Problem Solving</span>
                        <span class="stat-percentage">95%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 95%;"></div>
                    </div>
                </div>

                <!-- Stat 3 -->
                <div class="stat-row">
                    <div class="stat-info">
                        <span class="stat-name">☕ Caffeine Interfacing (Late Nights)</span>
                        <span class="stat-percentage">88%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 88%;"></div>
                    </div>
                </div>

                <!-- Stat 4 -->
                <div class="stat-row">
                    <div class="stat-info">
                        <span class="stat-name">📚 Stack Overflow & Documentation</span>
                        <span class="stat-percentage">90%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 90%;"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Graduation Photo Gallery Row/Grid -->
        <div class="gallery-grid">
            <!-- Photo 1 -->
            <div class="photo-card">
                <img src="y-tHGFjdSFyJkPOUv87i9Q.jpg" alt="Xzaviar - Freshman Year">
            </div>

            <!-- Photo 2 -->
            <div class="photo-card">
                <img src="6Vmm4WK4T-2Q1USLXTCfNA.jpg" alt="Xzaviar - Graduation Day">
            </div>
        </div>

    </main>

    <!-- Footer Area -->
    <footer>
        <p>&copy; 2026 Deirdre Cavins. All Rights Reserved.</p>
    </footer>

    <!-- Interactive Lightbox Overlay Component -->
    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="" alt="Enlarged view">
    </div>

</body>
</html>
